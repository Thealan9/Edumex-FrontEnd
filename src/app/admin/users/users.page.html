<ion-header class="ion-no-border">
  <ion-toolbar class="admin-toolbar">
    <div class="page-header-container">
      <div class="header-info">
        <h1>Gestión de <span>Usuarios</span></h1>
        <p class="text-slate-500 text-sm mt-1">Control de accesos, roles y seguridad del sistema</p>
      </div>

      <button (click)="openCreate()" class="add-book-btn">
        <ion-icon name="person-add-outline"></ion-icon>
        <span>Nuevo Usuario</span>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-slate-50/50">
  <div class="max-w-[1600px] mx-auto p-4 md:p-6 lg:p-8">

    <div *ngIf="loading" class="flex flex-col items-center justify-center py-32 w-full bg-white rounded-3xl border border-slate-100 shadow-sm mt-4">
      <div class="relative flex items-center justify-center w-16 h-16 mb-4">
        <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
        <ion-icon name="people" class="text-slate-300 text-xl"></ion-icon>
      </div>
      <p class="text-slate-400 text-[10px] uppercase tracking-[0.2em] font-black animate-pulse">Sincronizando Usuarios...</p>
    </div>

    <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-2">

      <div *ngFor="let user of users"
           class="bg-white rounded-[2rem] p-6 flex flex-col items-center text-center border border-slate-100 shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] hover:shadow-[0_15px_30px_-5px_rgba(6,81,237,0.15)] transition-all duration-500 relative overflow-hidden group hover:-translate-y-1"
           [class.opacity-80]="!user.active"
           [class.grayscale]="!user.active">

        <div class="absolute top-0 left-0 right-0 h-1.5 transition-colors duration-300"
             [ngClass]="user.active ? 'bg-emerald-500' : 'bg-slate-300'">
        </div>

        <div class="absolute top-5 right-5">
          <div class="w-2.5 h-2.5 rounded-full"
               [ngClass]="user.active ? 'bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.6)]' : 'bg-slate-400'"></div>
        </div>

        <div class="w-20 h-20 rounded-[1.25rem] flex items-center justify-center shrink-0 transition-all duration-500 mt-4 mb-5 group-hover:scale-110 shadow-sm"
             [ngClass]="user.active ? 'bg-blue-50 text-blue-600 border border-blue-100' : 'bg-slate-50 text-slate-400 border border-slate-200'">
          <ion-icon name="person" class="text-4xl"></ion-icon>
        </div>

        <div class="w-full min-w-0 mb-6 flex-1 flex flex-col justify-center">
          <h2 class="text-lg font-black text-slate-800 truncate uppercase tracking-tight leading-tight"
              [class.line-through]="!user.active">
            {{ user.name }}
          </h2>
          <p class="text-xs text-slate-400 truncate mt-1.5 font-bold flex items-center justify-center gap-1">
            <ion-icon name="mail" class="text-[10px]"></ion-icon>
            {{ user.email }}
          </p>

          <div class="mt-4">
            <span class="px-3 py-1 rounded-xl text-[9px] font-black uppercase tracking-widest transition-colors duration-300"
                  [ngClass]="user.active ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-slate-50 text-slate-400 border border-slate-200'">
              {{ user.active ? 'Acceso Permitido' : 'Cuenta Bloqueada' }}
            </span>
          </div>
        </div>

        <div class="w-full flex justify-center gap-3 border-t border-slate-50 pt-5 mt-auto relative z-10">

          <button [disabled]="!canEdit(user)"
                  (click)="openEdit(user)"
                  class="w-11 h-11 rounded-[1rem] flex items-center justify-center bg-slate-50 text-slate-400 hover:text-blue-600 hover:bg-blue-100 disabled:opacity-30 disabled:hover:bg-slate-50 disabled:hover:text-slate-400 transition-all shadow-sm hover:shadow"
                  title="Editar usuario">
            <ion-icon name="pencil-outline" class="text-xl"></ion-icon>
          </button>

          <button [disabled]="!canEdit(user)"
                  (click)="toggleActive(user)"
                  class="w-11 h-11 rounded-[1rem] flex items-center justify-center bg-slate-50 text-slate-400 disabled:opacity-30 disabled:hover:bg-slate-50 disabled:hover:text-slate-400 transition-all shadow-sm hover:shadow"
                  [ngClass]="user.active ? 'hover:text-amber-600 hover:bg-amber-100' : 'hover:text-emerald-600 hover:bg-emerald-100'"
                  [title]="user.active ? 'Bloquear acceso' : 'Habilitar acceso'">
            <ion-icon [name]="user.active ? 'lock-closed-outline' : 'lock-open-outline'" class="text-xl"></ion-icon>
          </button>

          <button [disabled]="!canEdit(user)"
                  (click)="delete(user)"
                  class="w-11 h-11 rounded-[1rem] flex items-center justify-center bg-slate-50 text-slate-400 hover:text-red-600 hover:bg-red-100 disabled:opacity-30 disabled:hover:bg-slate-50 disabled:hover:text-slate-400 transition-all shadow-sm hover:shadow"
                  title="Eliminar permanentemente">
            <ion-icon name="trash-outline" class="text-xl"></ion-icon>
          </button>

        </div>

      </div>
    </div>

  </div>
</ion-content>
