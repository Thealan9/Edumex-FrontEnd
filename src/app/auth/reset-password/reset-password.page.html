<ion-content class="login-page">

  <div class="login-split">

    <!-- Panel izquierdo: Branding -->
    <div class="brand-panel">
      <div class="brand-overlay"></div>
      <div class="brand-content">
        <img src="assets/logo-educamex.png" alt="EDUCAMEX" class="brand-logo">
        <h2 class="brand-tagline">Tu puerta al conocimiento</h2>
        <p class="brand-desc">Distribución de libros educativos</p>
        <div class="brand-features">
          <div class="feature-item">
            <a routerLink="/home">
              <ion-icon name="home-outline"></ion-icon>
              <span> Regresar al Inicio</span>
            </a>
          </div>
          <!--          <div class="feature-item">-->
          <!--            <ion-icon name="cube-outline"></ion-icon>-->
          <!--            <span>Gestión de inventario</span>-->
          <!--          </div>-->
          <!--          <div class="feature-item">-->
          <!--            <ion-icon name="analytics-outline"></ion-icon>-->
          <!--            <span>Reportes en tiempo real</span>-->
          <!--          </div>-->
        </div>
      </div>
    </div>

    <!-- Panel derecho: Formulario -->
    <div class="form-panel">
      <div class="form-wrapper">

        <div class="mobile-logo">
          <img src="assets/logo-educamex.png" alt="EDUCAMEX">
        </div>

        <div class="text-intro">
          <h1>Crea una nueva contraseña</h1>
          <p>Ingresa tu nueva contraseña para acceder nuevamente a tu cuenta.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="resetPassword()" class="login-form">

          <div class="input-group" [class.active]="focusedField === 'password'" [class.error]="form.get('password')?.invalid && form.get('password')?.touched">
            <label>Nueva Contraseña</label>
            <div class="input-box">
              <ion-icon name="lock-closed-outline"></ion-icon>
              <input
                [type]="passwordType"
                formControlName="password"
                placeholder="Mínimo 8 caracteres"
                (focus)="focusedField = 'password'"
                (blur)="focusedField = ''">

              <button type="button" class="eye-btn" (click)="togglePassword()">
                <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>
          </div>

          <div class="input-group" [class.active]="focusedField === 'password_confirmation'" [class.error]="form.get('password_confirmation')?.invalid && form.get('password_confirmation')?.touched">
            <label>Confirmar Contraseña</label>
            <div class="input-box">
              <ion-icon name="lock-closed-outline"></ion-icon>
              <input
                [type]="passwordType"
                formControlName="password_confirmation"
                placeholder="Repite tu contraseña"
                (focus)="focusedField = 'password_confirmation'"
                (blur)="focusedField = ''">

              <button type="button" class="eye-btn" (click)="togglePassword()">
                <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>

            <p class="text-xs text-red-500 mt-1 font-bold" *ngIf="form.get('password')?.value !== form.get('password_confirmation')?.value && form.get('password_confirmation')?.touched">
              Las contraseñas no coinciden.
            </p>
          </div>

          <button type="submit" class="hero-button" [disabled]="isSubmitting || form.invalid">
            <span *ngIf="!isSubmitting">Guardar Contraseña</span>
            <div class="loader" *ngIf="isSubmitting"></div>
          </button>

          <p class="text-center text-sm pt-4">
            <a routerLink="/login" class="text-slate-500! font-bold">Volver al inicio de sesión</a>
          </p>
        </form>

      </div>
    </div>

  </div>

</ion-content>
