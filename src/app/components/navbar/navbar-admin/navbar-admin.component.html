<ion-app>
  <ion-split-pane contentId="main-content" when="(min-width: 1024px)" [style.--side-width]="isCollapsed ? '80px' : '280px'">

    <ion-menu contentId="main-content" type="overlay">
      <ion-content>
        <div class="sidebar-container">

          <div class="sidebar-header"
               [class.px-6]="!isCollapsed"
               [class.px-0]="isCollapsed"
               [class.justify-between]="!isCollapsed"
               [class.justify-center]="isCollapsed">
            <div *ngIf="!isCollapsed" class="brand-box">
              <div class="sidebar-logo-wrap">
                <img src="assets/logo-educamex.png" alt="EDUCAMEX" class="sidebar-logo">
              </div>
              <span class="brand-name">EDUMEX</span>
            </div>

            <button (click)="isCollapsed = !isCollapsed" class="collapse-btn hidden lg:flex">
              <ion-icon [name]="isCollapsed ? 'chevron-forward-outline' : 'chevron-back-outline'"></ion-icon>
            </button>
          </div>

          <div class="flex-1 px-4 space-y-1">
            <p *ngIf="!isCollapsed" class="nav-section-label">Menú Principal</p>

            <ion-menu-toggle auto-hide="false">
              <nav class="space-y-1">

                <ion-item routerLink="/admin" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" lines="none" class="sidebar-item" [class.collapsed]="isCollapsed">
                  <ion-icon slot="start" name="home-outline"></ion-icon>
                  <ion-label *ngIf="!isCollapsed">Dashboard</ion-label>
                </ion-item>

                <ion-item routerLink="/admin/users" routerLinkActive="active-link" lines="none" class="sidebar-item" [class.collapsed]="isCollapsed">
                  <ion-icon slot="start" name="people-outline"></ion-icon>
                  <ion-label *ngIf="!isCollapsed">Usuarios</ion-label>
                </ion-item>

                <ion-item routerLink="/admin/books" routerLinkActive="active-link" lines="none" class="sidebar-item" [class.collapsed]="isCollapsed">
                  <ion-icon slot="start" name="cube-outline"></ion-icon>
                  <ion-label *ngIf="!isCollapsed">Catalogo</ion-label>
                </ion-item>

                <ion-item routerLink="/admin/location" routerLinkActive="active-link" lines="none" class="sidebar-item" [class.collapsed]="isCollapsed">
                  <ion-icon slot="start" name="book-outline"></ion-icon>
                  <ion-label *ngIf="!isCollapsed">Capacidad</ion-label>
                </ion-item>

                <ion-item routerLink="/admin/reports" routerLinkActive="active-link" lines="none" class="sidebar-item" [class.collapsed]="isCollapsed">
                  <ion-icon slot="start" name="layers-outline"></ion-icon>
                  <ion-label *ngIf="!isCollapsed">Reportes</ion-label>
                </ion-item>
              </nav>
            </ion-menu-toggle>

            <div class="sidebar-divider"></div>

          </div>

          <div class="sidebar-footer">
            <div id="profile-trigger" class="profile-trigger" [class.justify-center]="isCollapsed">
              <div class="profile-avatar">
                <ion-icon name="person" class="text-xl"></ion-icon>
              </div>
              <div *ngIf="!isCollapsed" class="flex-1 min-w-0">
                <p class="profile-name">
                  Perfil <ion-icon name="chevron-up-outline" class="text-xs"></ion-icon></p>
              </div>
            </div>

            <ion-popover trigger="profile-trigger" triggerAction="click" [dismissOnSelect]="true" class="profile-popover">
              <ng-template>
                <ion-content>
                  <ion-list lines="none" class="popover-list">
                    <ion-item button routerLink="/admin/profile" class="popover-item">
                      <ion-icon slot="start" name="person-outline" class="popover-icon-profile"></ion-icon>
                      <ion-label>Mi Perfil</ion-label>
                    </ion-item>
                    <div class="popover-divider"></div>
                    <ion-item button (click)="logout()" class="popover-item logout">
                      <ion-icon slot="start" name="log-out-outline" class="popover-icon-logout"></ion-icon>
                      <ion-label>Cerrar Sesión</ion-label>
                    </ion-item>
                  </ion-list>
                </ion-content>
              </ng-template>
            </ion-popover>
          </div>
        </div>
      </ion-content>
    </ion-menu>

    <div class="ion-page" id="main-content">
      <ion-header class="ion-no-border" *ngIf="isMobile$ | async">
        <ion-toolbar class="mobile-toolbar">
          <ion-buttons slot="start">
            <ion-menu-button class="mobile-menu-btn"></ion-menu-button>
          </ion-buttons>
          <ion-title class="mobile-title">EDUMEX</ion-title>
        </ion-toolbar>
      </ion-header>
      <router-outlet></router-outlet>
    </div>

  </ion-split-pane>
