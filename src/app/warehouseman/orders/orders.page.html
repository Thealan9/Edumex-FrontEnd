<ion-header class="ion-no-border">
  <ion-toolbar class="admin-toolbar">
    <div class="page-header-container">
      <div class="header-info">
        <div class="flex items-center gap-2">
          <button [routerLink]="['/warehouseman']" class="text-navy bg-light p-2 rounded-xl active:scale-95 transition-all">
            <ion-icon name="arrow-back-outline" class="text-xl"></ion-icon>
          </button>
          <h1>Panel de <span>Despacho</span></h1>
        </div>
        <p class="text-slate-500 text-sm mt-1 ml-11">Preparación y salida de pedidos pendientes</p>
      </div>

      <div class="bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100 flex items-center gap-3">
        <ion-icon name="clipboard-outline" class="text-blue-600 text-xl"></ion-icon>
        <span class="text-blue-700 text-[10px] font-black uppercase tracking-widest">
          Pedidos por Surtir {{ pendingOrders.length }}
        </span>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-slate-50">
  <div class="p-6">

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

      <div *ngFor="let order of pendingOrders"
           class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col hover:shadow-xl transition-all duration-300">

<!--        <div class="bg-navy p-5 flex justify-between items-center text-white">-->
<!--          <div>-->
<!--            <p class="text-[9px] uppercase font-black text-blue-300 tracking-[0.2em]">Referencia</p>-->
<!--            <h2 class="text-xl font-black italic">#{{ order.id }}</h2>-->
<!--          </div>-->
<!--          <div class="text-right">-->
<!--            <p class="text-[10px] font-bold text-blue-300 uppercase">{{ order.created_at | date:'shortTime' }}</p>-->
<!--          </div>-->
<!--        </div>-->

        <div class="p-5 flex-1">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-[10px] font-black text-gray uppercase tracking-widest">Detalles</h3>
           </div>

          <div class="space-y-3">
            <div *ngFor="let item of order.items"
                 class="flex items-center gap-4 p-3 bg-light rounded-2xl border border-slate-100 transition-colors hover:bg-white">

              <div class="w-10 h-10 bg-navy text-black rounded-xl flex items-center justify-center font-black text-sm shadow-md">
                {{ item.quantity }}
              </div>

              <div class="flex-1 overflow-hidden">
                <p class="text-[11px] font-black text-navy uppercase truncate leading-tight">{{ item.book.title }}</p>

                <div class="flex items-center gap-2 mt-1">
                  <span [class]="item.buy_type === 'package' ? 'bg-purple-100 text-purple-700' : 'bg-orange-100 text-orange-700'"
                        class="text-[8px] font-black uppercase px-2 py-0.5 rounded-lg tracking-tighter">
                    {{ item.buy_type === 'package' ? 'Paquete' : 'Unidad' }}
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="p-5 bg-slate-50 border-t border-slate-100">
          <button (click)="dispatchOrder(order.id)"
                  class="w-full bg-emerald-500 hover:bg-emerald-600 text-navy py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-emerald-200 active:scale-95 transition-all flex items-center justify-center gap-2">
            <ion-icon name="cube-outline" class="text-lg"></ion-icon>
            Confirmar Despacho
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="pendingOrders.length === 0" class="flex flex-col items-center justify-center min-h-[60vh] text-slate-400">
      <ion-icon name="cube-outline" style="font-size: 80px;"></ion-icon>
      <p class="font-bold mt-4 uppercase tracking-widest">No hay órdenes pendientes</p>
    </div>
  </div>

</ion-content>
